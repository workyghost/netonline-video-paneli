<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetOnline Video Player</title>
  <meta name="robots" content="noindex, nofollow">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-black min-h-screen">

  <!-- Setup Screen -->
  <div id="setupScreen" class="min-h-screen flex items-center justify-center">
    <div class="bg-slate-800/90 backdrop-blur-md rounded-2xl shadow-2xl p-8 w-full max-w-md border border-slate-700">

      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-white">NetOnline Player</h1>
        <p class="text-slate-400 mt-2 text-sm">TV Kurulum Ekranı</p>
      </div>

      <div class="space-y-5">
        <!-- Firma Seçimi -->
        <div>
          <label for="firmSelect" class="block text-sm font-medium text-slate-300 mb-1">Firma</label>
          <select id="firmSelect" required
            class="w-full px-4 py-3 rounded-lg bg-slate-700 border border-slate-600 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            <option value="">Firma seçin...</option>
          </select>
        </div>

        <!-- Ekran Adı -->
        <div>
          <label for="screenName" class="block text-sm font-medium text-slate-300 mb-1">Ekran Adı</label>
          <input type="text" id="screenName" placeholder="Kadıköy Şubesi - Giriş TV" maxlength="100"
            class="w-full px-4 py-3 rounded-lg bg-slate-700 border border-slate-600 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        </div>

        <!-- Konum -->
        <div>
          <label for="screenLocation" class="block text-sm font-medium text-slate-300 mb-1">Konum</label>
          <input type="text" id="screenLocation" placeholder="İstanbul, Kadıköy" maxlength="100"
            class="w-full px-4 py-3 rounded-lg bg-slate-700 border border-slate-600 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        </div>

        <!-- Yön -->
        <div>
          <span class="block text-sm font-medium text-slate-300 mb-2">Ekran Yönü</span>
          <div class="flex gap-6">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="screenOrientation" value="horizontal" class="accent-blue-500 w-4 h-4">
              <span class="text-slate-300 text-sm">Yatay</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="screenOrientation" value="vertical" class="accent-blue-500 w-4 h-4">
              <span class="text-slate-300 text-sm">Dikey</span>
            </label>
          </div>
        </div>

        <!-- Kaydet Butonu -->
        <button id="saveScreenButton"
          class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
          Ekranı Kaydet
        </button>

        <!-- Hata Mesajı -->
        <div id="setupError" class="hidden text-red-400 text-sm text-center bg-red-400/10 rounded-lg p-3"></div>
      </div>
    </div>
  </div>

  <!-- Player Screen (hidden initially, shown after setup) -->
  <div id="playerScreen" class="hidden fixed inset-0 bg-black">
    <!-- Blur background video -->
    <video id="bgVideo" class="absolute inset-0 w-full h-full object-cover blur-xl scale-110 opacity-60" muted playsinline></video>
    <!-- Main video -->
    <video id="mainVideo" class="absolute inset-0 w-full h-full object-contain z-10" playsinline></video>

    <!-- Settings button (small gear icon, top-right) -->
    <button id="resetButton" class="absolute top-4 right-4 z-20 p-2 bg-black/50 rounded-full text-white/50 hover:text-white hover:bg-black/80 transition opacity-0 hover:opacity-100">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    </button>
  </div>

  <script type="module" src="js/player.js"></script>
</body>
</html>
