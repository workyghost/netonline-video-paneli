<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetOnline Video Player</title>
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <!-- Prodüksiyon ortamında bu değerleri deploy pipeline'ınız doldurur. -->
  <!-- Geliştirme (localhost) için mock-server otomatik devreye girer (supabase-config.js). -->
  <script>
    // Deploy sırasında CI/CD pipeline veya sed komutuyla gerçek değerlerle değiştirilir.
    // Lokal geliştirmede bu değerler kullanılmaz (mock-server otomatik devreye girer).
    window.__SUPABASE_URL      = '%%SUPABASE_URL%%';
    window.__SUPABASE_ANON_KEY = '%%SUPABASE_ANON_KEY%%';
  </script>
  <link rel="modulepreload" href="js/player.js">
  <link rel="modulepreload" href="js/supabase-config.js">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-black min-h-screen">
<noscript>
  <div style="color:white;text-align:center;padding:2rem">
    Bu uygulama modern bir tarayıcı gerektirir. Lütfen Chrome veya Edge kullanın.
  </div>
</noscript>

  <!-- Setup Screen -->
  <div id="setupScreen" class="min-h-screen flex items-center justify-center">
    <div class="bg-slate-800/90 backdrop-blur-md rounded-2xl shadow-2xl p-8 w-full max-w-md border border-slate-700">

      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-white">NetOnline Player</h1>
        <p class="text-slate-400 mt-2 text-sm">TV Kurulum Ekranı</p>
      </div>

      <div class="space-y-5">
        <!-- Firma Seçimi -->
        <div>
          <label for="firmSelect" class="block text-sm font-medium text-slate-300 mb-1">Firma</label>
          <select id="firmSelect" required
            class="w-full px-4 py-3 rounded-lg bg-slate-700 border border-slate-600 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            <option value="">Firma seçin...</option>
          </select>
        </div>

        <!-- Ekran Adı -->
        <div>
          <label for="screenName" class="block text-sm font-medium text-slate-300 mb-1">Ekran Adı</label>
          <input type="text" id="screenName" placeholder="Kadıköy Şubesi - Giriş TV" maxlength="100"
            class="w-full px-4 py-3 rounded-lg bg-slate-700 border border-slate-600 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        </div>

        <!-- Konum -->
        <div>
          <label for="screenLocation" class="block text-sm font-medium text-slate-300 mb-1">Konum</label>
          <input type="text" id="screenLocation" placeholder="İstanbul, Kadıköy" maxlength="100"
            class="w-full px-4 py-3 rounded-lg bg-slate-700 border border-slate-600 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        </div>

        <!-- Kaydet Butonu -->
        <button id="saveScreenButton"
          class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
          Ekranı Kaydet
        </button>

        <!-- Hata Mesajı -->
        <div id="setupError" class="hidden text-red-400 text-sm text-center bg-red-400/10 rounded-lg p-3"></div>
      </div>
    </div>
  </div>

  <!-- Link Mode Overlay (shown when ?screen= param is present, before user clicks play) -->
  <div id="linkOverlay" class="hidden fixed inset-0 bg-black z-50 flex flex-col items-center justify-center cursor-pointer">
    <svg width="80" height="80" viewBox="0 0 80 80" fill="white" xmlns="http://www.w3.org/2000/svg">
      <circle cx="40" cy="40" r="38" stroke="white" stroke-width="3" fill="none" opacity="0.3"/>
      <polygon points="32,22 62,40 32,58" fill="white"/>
    </svg>
    <p class="text-white/60 text-sm mt-4">Oynatmak için tıklayın</p>
  </div>

  <!-- Player Screen (hidden initially, shown after setup) -->
  <div id="playerScreen" class="hidden fixed inset-0 bg-black">
    <!-- Blur background video -->
    <video id="bgVideo" class="absolute inset-0 w-full h-full object-cover blur-xl scale-110 opacity-60" muted playsinline></video>
    <!-- Main video -->
    <video id="mainVideo" class="absolute inset-0 w-full h-full object-contain z-10" playsinline></video>
    <!-- Blur background image (görseller için) -->
    <img id="bgImage"   class="absolute inset-0 w-full h-full object-cover blur-xl scale-110 opacity-60 hidden" alt="">
    <!-- Main image -->
    <img id="mainImage" class="absolute inset-0 w-full h-full object-contain z-10 hidden" alt="">

    <!-- Settings button (small gear icon, top-right) -->
    <button id="resetButton" class="absolute top-4 right-4 z-20 p-2 bg-black/50 rounded-full text-white/50 hover:text-white hover:bg-black/80 transition opacity-0 hover:opacity-100">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    </button>

    <!-- Control Bar (visible on hover, auto-hides after 3s) -->
    <div id="controlBar" class="absolute bottom-0 left-0 right-0 z-20 flex items-center gap-3 px-4"
      style="height:48px; background:rgba(0,0,0,0.6); opacity:0; transition:opacity 0.3s ease;">
      <!-- Play/Pause -->
      <button id="ctrlPlayPause" class="text-white hover:text-gray-300 transition-colors" title="Oynat/Duraklat">
        <svg id="iconPlay" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg id="iconPause" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>
      <!-- Mute/Unmute -->
      <button id="ctrlMute" class="text-white hover:text-gray-300 transition-colors" title="Ses Aç/Kapat">
        <svg id="iconUnmuted" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
        </svg>
        <svg id="iconMuted" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24">
          <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
        </svg>
      </button>
      <!-- Spacer -->
      <div class="flex-1"></div>
      <!-- Fullscreen -->
      <button id="ctrlFullscreen" class="text-white hover:text-gray-300 transition-colors" title="Tam Ekran">
        <svg id="iconFullscreenEnter" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
        <svg id="iconFullscreenExit" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24">
          <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
        </svg>
      </button>
    </div>
  </div>

  <script type="module" src="js/player.js"></script>
</body>
</html>
