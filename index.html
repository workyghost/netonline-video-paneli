<body class="login-bg flex items-center justify-center">

  <!-- Login Kartı -->
  <div class="bg-white/10 backdrop-blur-md rounded-2xl shadow-2xl p-8 w-full max-w-md border border-white/20">

    <!-- Başlık -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white tracking-tight">NetOnline</h1>
      <p class="text-slate-300 mt-2 text-sm">Video Yayın Yönetim Paneli</p>
    </div>

    <!-- Login Formu -->
    <form id="loginForm" class="space-y-5">
      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-slate-300 mb-1">E-posta</label>
        <input
          type="email"
          id="email"
          required
          autocomplete="email"
          placeholder="admin@netonline.com"
          class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
        >
      </div>

      <!-- Şifre -->
      <div>
        <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Şifre</label>
        <input
          type="password"
          id="password"
          required
          autocomplete="current-password"
          placeholder="••••••••"
          class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
        >
      </div>

      <!-- Hata Mesajı Alanı -->
      <div id="errorMessage" class="hidden error-message text-red-400 text-sm text-center bg-red-400/10 rounded-lg p-3"></div>

      <!-- Giriş Butonu -->
      <button
        type="submit"
        id="loginButton"
        class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition duration-200 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <span id="loginButtonText">Giriş Yap</span>
        <span id="loginSpinner" class="spinner hidden"></span>
      </button>
    </form>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
