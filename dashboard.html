<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetOnline Video Paneli — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-900 text-white min-h-screen">

  <!-- Header -->
  <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex items-center justify-between">
    <h1 class="text-xl font-bold tracking-tight">NetOnline Video Paneli</h1>
    <button id="logoutButton" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded-lg transition">
      Çıkış Yap
    </button>
  </header>

  <main class="max-w-6xl mx-auto p-6 space-y-8">

    <!-- Upload Section -->
    <section class="bg-slate-800 rounded-2xl p-6 border border-slate-700">
      <h2 class="text-lg font-semibold mb-4">Video Yükle</h2>

      <!-- Drop Zone -->
      <div id="dropZone" class="border-2 border-dashed border-slate-600 rounded-xl p-10 text-center cursor-pointer hover:border-blue-500 hover:bg-slate-700/50 transition">
        <svg class="mx-auto h-12 w-12 text-slate-400 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
        <p class="text-slate-300">Videoyu sürükle veya <span class="text-blue-400 underline">tıkla</span></p>
        <p class="text-slate-500 text-sm mt-1">Sadece MP4 formatı</p>
        <input type="file" id="fileInput" accept=".mp4,video/mp4" class="hidden">
      </div>

      <!-- Selected File Name -->
      <p id="selectedFileName" class="text-sm text-slate-400 mt-2 hidden"></p>

      <!-- Upload Form (hidden until file selected) -->
      <div id="uploadForm" class="hidden mt-6 space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Video Başlığı -->
          <div>
            <label for="videoTitle" class="block text-sm font-medium text-slate-300 mb-1">Video Başlığı</label>
            <input type="text" id="videoTitle" required placeholder="Video adını girin"
              class="w-full px-4 py-2.5 rounded-lg bg-slate-700 border border-slate-600 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
          </div>

          <!-- Firma Seçimi -->
          <div>
            <label for="firmSelect" class="block text-sm font-medium text-slate-300 mb-1">Firma</label>
            <select id="firmSelect" required
              class="w-full px-4 py-2.5 rounded-lg bg-slate-700 border border-slate-600 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
              <option value="">Firma seçin...</option>
            </select>
          </div>

          <!-- Yön Etiketi -->
          <div>
            <label for="orientationSelect" class="block text-sm font-medium text-slate-300 mb-1">Yön Etiketi</label>
            <select id="orientationSelect" required
              class="w-full px-4 py-2.5 rounded-lg bg-slate-700 border border-slate-600 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
              <option value="">Yön seçin...</option>
              <option value="horizontal">Yatay</option>
              <option value="vertical">Dikey</option>
              <option value="both">Ortak</option>
            </select>
          </div>

          <!-- Bitiş Tarihi -->
          <div>
            <label for="expiryDate" class="block text-sm font-medium text-slate-300 mb-1">Bitiş Tarihi <span class="text-slate-500">(opsiyonel)</span></label>
            <input type="date" id="expiryDate"
              class="w-full px-4 py-2.5 rounded-lg bg-slate-700 border border-slate-600 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
          </div>
        </div>

        <!-- Upload Button -->
        <button id="uploadButton"
          class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
          Yükle
        </button>
      </div>

      <!-- Progress Bar -->
      <div id="progressContainer" class="hidden mt-4">
        <div class="flex items-center justify-between mb-1">
          <span class="text-sm text-slate-300">Yükleniyor...</span>
          <span id="progressText" class="text-sm text-blue-400">0%</span>
        </div>
        <div class="w-full bg-slate-700 rounded-full h-3">
          <div id="progressBar" class="bg-blue-600 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
      </div>
    </section>

    <!-- Video List Section -->
    <section class="bg-slate-800 rounded-2xl p-6 border border-slate-700">
      <h2 class="text-lg font-semibold mb-4">Video Listesi</h2>

      <!-- Empty State -->
      <div id="emptyState" class="text-center py-10 text-slate-400">
        <svg class="mx-auto h-12 w-12 text-slate-500 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
        </svg>
        <p>Henüz video yüklenmemiş.</p>
      </div>

      <!-- Video Table -->
      <div class="overflow-x-auto hidden" id="videoTableContainer">
        <table class="w-full text-sm text-left">
          <thead class="text-slate-400 border-b border-slate-700">
            <tr>
              <th class="py-3 px-3">Kapak</th>
              <th class="py-3 px-3">Video Adı</th>
              <th class="py-3 px-3">Firma</th>
              <th class="py-3 px-3">Yön</th>
              <th class="py-3 px-3">Bitiş Tarihi</th>
              <th class="py-3 px-3">Durum</th>
              <th class="py-3 px-3">İşlem</th>
            </tr>
          </thead>
          <tbody id="videoList">
            <!-- Video rows will be inserted here by JS -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
